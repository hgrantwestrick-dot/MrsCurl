<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150">
  <!-- Ears -->
  <circle cx="30" cy="28" r="16" fill="#7B4A22"/>
  <circle cx="90" cy="28" r="16" fill="#7B4A22"/>
  <circle cx="30" cy="28" r="9"  fill="#A0652D"/>
  <circle cx="90" cy="28" r="9"  fill="#A0652D"/>

  <!-- Head -->
  <ellipse cx="60" cy="52" rx="34" ry="30" fill="#A0652D"/>
  <ellipse cx="48" cy="44" rx="11" ry="8" fill="#B5753A" opacity=".45"/>

  <!-- Eyes -->
  <circle cx="46" cy="46" r="6" fill="#1a0800"/>
  <circle cx="74" cy="46" r="6" fill="#1a0800"/>
  <circle cx="48" cy="44" r="2.2" fill="white" opacity=".7"/>
  <circle cx="76" cy="44" r="2.2" fill="white" opacity=".7"/>

  <!-- Snout -->
  <ellipse cx="60" cy="62" rx="15" ry="11" fill="#7B4A22"/>
  <ellipse cx="60" cy="58" rx="5"  ry="4"  fill="#1a0800"/>
  <path d="M53 64 Q60 71 67 64" stroke="#1a0800" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="60" cy="108" rx="34" ry="36" fill="#A0652D"/>
  <ellipse cx="60" cy="114" rx="20" ry="22" fill="#8B5522"/>

  <!-- Left arm (down) -->
  <ellipse cx="20" cy="100" rx="13" ry="20" fill="#7B4A22" transform="rotate(15 20 100)"/>

  <!-- Right arm (raised, holding cone) -->
  <ellipse cx="102" cy="82" rx="13" ry="22" fill="#7B4A22" transform="rotate(-40 102 82)"/>

  <!-- Ice cream cone -->
  <!-- Waffle cone body -->
  <polygon points="96,72 106,72 100,100" fill="#D4902A"/>
  <!-- Cone grid lines -->
  <line x1="97" y1="78" x2="105" y2="78" stroke="#B8761A" stroke-width="1"/>
  <line x1="97.5" y1="84" x2="104.5" y2="84" stroke="#B8761A" stroke-width="1"/>
  <line x1="98" y1="90" x2="104" y2="90" stroke="#B8761A" stroke-width="1"/>
  <line x1="100" y1="72" x2="98" y2="96" stroke="#B8761A" stroke-width="1"/>
  <line x1="102" y1="72" x2="101" y2="96" stroke="#B8761A" stroke-width="1"/>
  <line x1="104" y1="72" x2="103" y2="90" stroke="#B8761A" stroke-width="1"/>
  <!-- Soft serve swirl (white) -->
  <ellipse cx="101" cy="62" rx="10" ry="7" fill="white"/>
  <ellipse cx="101" cy="56" rx="8"  ry="6" fill="white"/>
  <ellipse cx="101" cy="51" rx="6"  ry="5" fill="white"/>
  <ellipse cx="101" cy="47" rx="4"  ry="4" fill="white"/>
  <circle  cx="101" cy="44" r="3"   fill="white"/>

  <!-- Legs -->
  <ellipse cx="40" cy="138" rx="16" ry="11" fill="#7B4A22"/>
  <ellipse cx="80" cy="138" rx="16" ry="11" fill="#7B4A22"/>

  <!-- Bow tie -->
  <polygon points="47,81 60,87 47,93" fill="#c0392b"/>
  <polygon points="73,81 60,87 73,93" fill="#c0392b"/>
  <circle  cx="60" cy="87" r="5" fill="#922b21"/>
  <!-- Bow tie dots -->
  <circle cx="51" cy="84" r="1.5" fill="#e74c3c" opacity=".7"/>
  <circle cx="54" cy="89" r="1.5" fill="#e74c3c" opacity=".7"/>
  <circle cx="69" cy="84" r="1.5" fill="#e74c3c" opacity=".7"/>
  <circle cx="66" cy="89" r="1.5" fill="#e74c3c" opacity=".7"/>
</svg>
